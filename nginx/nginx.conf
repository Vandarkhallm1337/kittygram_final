server {
    listen 80;

    server_name _;

    # 🔥 фронтенд
    location / {
        root /static;
        index index.html;
        try_files $uri /index.html;
    }

    # 🔥 API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 🔥 admin
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
    }

    # 🔥 media
    location /media/ {
        proxy_pass http://backend:8000/media/;
    }
}