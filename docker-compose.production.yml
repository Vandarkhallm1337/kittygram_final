version: '3.9'

services:
  db:
    image: postgres:13
    env_file: .env

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db

  gateway:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - backend
  frontend:
    build: ./frontend
    env_file: .env