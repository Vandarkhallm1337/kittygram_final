volumes:
  pg_data:
  static:
  media:

services:

  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/app/static
      - media:/app/media
    command: sh -c "python manage.py migrate &&
           python manage.py collectstatic --noinput &&
           gunicorn kittygram_backend.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build: ./frontend
    env_file: .env
    volumes:
      - static:/app/build

  gateway:
    build: 
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - static:/static
      - media:/media
